<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#2979ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 上段左：数値カード -->
  <rect x="52" y="60" width="180" height="110" rx="20" fill="rgba(255,255,255,0.07)"/>
  <rect x="52" y="60" width="180" height="4" rx="2" fill="url(#accent)"/>
  <rect x="76" y="90" width="60" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <text x="76" y="148" font-family="Arial,sans-serif" font-weight="700" font-size="44" fill="white">42</text>

  <!-- 上段右：ドーナツ風メーター -->
  <rect x="252" y="60" width="208" height="110" rx="20" fill="rgba(255,255,255,0.07)"/>
  <rect x="252" y="60" width="208" height="4" rx="2" fill="#4caf50"/>
  <!-- トラック -->
  <circle cx="356" cy="115" r="38" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="12"/>
  <!-- 進捗弧（72%） -->
  <circle cx="356" cy="115" r="38" fill="none" stroke="#4caf50" stroke-width="12"
    stroke-dasharray="171 67" stroke-dashoffset="0"
    stroke-linecap="round" transform="rotate(-90 356 115)"/>
  <text x="356" y="122" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">72%</text>

  <!-- 中段：棒グラフカード -->
  <rect x="52" y="192" width="408" height="150" rx="20" fill="rgba(255,255,255,0.07)"/>
  <rect x="52" y="192" width="408" height="4" rx="2" fill="url(#accent)"/>
  <rect x="76" y="216" width="80" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <!-- バー -->
  <rect x="84"  y="272" width="36" height="56" rx="8" fill="url(#bar1)" opacity="0.7"/>
  <rect x="138" y="252" width="36" height="76" rx="8" fill="url(#bar1)"/>
  <rect x="192" y="264" width="36" height="64" rx="8" fill="url(#bar1)" opacity="0.85"/>
  <rect x="246" y="240" width="36" height="88" rx="8" fill="url(#bar2)"/>
  <rect x="300" y="256" width="36" height="72" rx="8" fill="url(#bar1)" opacity="0.9"/>
  <rect x="354" y="244" width="36" height="84" rx="8" fill="#42a5f5"/>

  <!-- 下段左：ラインカード -->
  <rect x="52" y="364" width="180" height="88" rx="20" fill="rgba(255,255,255,0.07)"/>
  <rect x="52" y="364" width="180" height="4" rx="2" fill="#ff9800"/>
  <polyline points="72,430 96,418 120,422 144,408 168,412 192,400 216,406"
    fill="none" stroke="#ff9800" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="216" cy="406" r="6" fill="#ff9800"/>

  <!-- 下段右：ステータス -->
  <rect x="252" y="364" width="208" height="88" rx="20" fill="rgba(255,255,255,0.07)"/>
  <rect x="252" y="364" width="208" height="4" rx="2" fill="#4caf50"/>
  <circle cx="290" cy="398" r="8" fill="#4caf50"/>
  <rect x="308" y="392" width="80" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="290" cy="426" r="8" fill="#42a5f5"/>
  <rect x="308" y="420" width="100" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>
</svg>
