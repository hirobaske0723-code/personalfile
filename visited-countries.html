<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪問国マップ</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1565c0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/css/jsvectormap.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'BIZ UDGothic', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    padding: 20px 16px 16px;
    text-align: center;
  }
  .back-link {
    display: inline-block;
    font-size: 0.83rem;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    margin-bottom: 10px;
  }
  .header h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .header p  { font-size: 0.82rem; color: rgba(255,255,255,0.7); }

  .stats-row {
    display: flex;
    gap: 10px;
    padding: 16px;
    justify-content: center;
  }
  .stat-card {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 18px;
    text-align: center;
    flex: 1;
    max-width: 130px;
  }
  .stat-num  { font-size: 1.6rem; font-weight: bold; color: #4fc3f7; }
  .stat-label{ font-size: 0.72rem; color: #aaa; margin-top: 2px; }

  #map-wrap {
    padding: 0 8px;
    height: 280px;
  }
  #map { width: 100%; height: 100%; }
  .jsvectormap-tooltip {
    background: #333;
    color: #fff;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.82rem;
  }

  .hint {
    text-align: center;
    font-size: 0.75rem;
    color: #666;
    padding: 6px 0 2px;
  }

  .continents {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 16px;
  }
  .cont-card {
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .cont-emoji { font-size: 1.3rem; }
  .cont-name  { font-size: 0.7rem; color: #aaa; margin: 2px 0; }
  .cont-count { font-size: 1rem; font-weight: bold; color: #81d4fa; }

  .visited-section {
    padding: 0 16px 32px;
  }
  .section-title {
    font-size: 0.85rem;
    color: #aaa;
    font-weight: bold;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .country-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .country-chip {
    background: rgba(76, 175, 80, 0.15);
    border: 1px solid rgba(76, 175, 80, 0.4);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .country-chip:hover { background: rgba(229, 57, 53, 0.2); border-color: #e53935; }
  .empty-msg { color: #555; font-size: 0.85rem; padding: 8px 0; }

  /* 確認モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #1e2a3a;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 28px 20px 20px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .modal-flag { font-size: 2.5rem; margin-bottom: 8px; }
  .modal-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 6px; }
  .modal-msg  { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1; padding: 12px; border: none;
    border-radius: 12px; font-size: 0.9rem;
    font-weight: bold; cursor: pointer;
  }
  .btn-add    { background: #4caf50; color: white; }
  .btn-remove { background: #e53935; color: white; }
  .btn-cancel { background: rgba(255,255,255,0.1); color: #ccc; }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-link">← ホームに戻る</a>
  <h1>🗺️ 訪問国マップ</h1>
  <p>タップした国が緑になります</p>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num" id="count">0</div>
    <div class="stat-label">訪問国数</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="pct">0%</div>
    <div class="stat-label">世界の割合</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="cont-count">0</div>
    <div class="stat-label">大陸数</div>
  </div>
</div>

<div id="map-wrap"><div id="map"></div></div>
<p class="hint">タップ / クリックで訪問済みに切り替え</p>

<div class="continents" id="continents"></div>

<div class="visited-section">
  <div class="section-title">✅ 訪問済みリスト（タップで削除）</div>
  <div class="country-list" id="country-list">
    <span class="empty-msg">まだ国が選ばれていません</span>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-flag" id="modalFlag"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-msg"  id="modalMsg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button id="modalActionBtn" onclick="confirmAction()"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/js/jsvectormap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/maps/world.js"></script>

const CONTINENTS = {

function getFlag(code) {
  return [...code.toUpperCase()].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join('');
}

let visited = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let pendingCode = null;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(visited)); }

// マップを visited 配列の状態で作り直す
let map = null;
function syncMap() {
  document.getElementById('map').innerHTML = '';
  map = new jsVectorMap({
    selector: '#map',
    map: 'world',
    backgroundColor: '#1a1a2e',
    regionStyle: {
      initial:       { fill: '#2d3561', stroke: '#1a1a2e', strokeWidth: 0.5 },
      hover:         { fill: '#42a5f5', fillOpacity: 1 },
      selected:      { fill: '#4caf50' },
      selectedHover: { fill: '#66bb6a' },
    },
    selectedRegions: [...visited],
    multiSelectRegion: true,
    onRegionClick(event, code) { showModal(code); },
    onRegionTooltipShow(event, tooltip, code) {
      const alpha3 = A3[code] || code;
      const name   = COUNTRIES[code]?.[0] || '';
      const isVisited = visited.includes(code);
      tooltip.text(`${alpha3} ${name}${isVisited ? ' ✅' : ''}`);
    },
  });
}

function updateStats() {
  document.getElementById('count').textContent = visited.length;
  document.getElementById('pct').textContent = Math.round(visited.length / TOTAL * 100) + '%';

  const conts = new Set(visited.map(c => COUNTRIES[c]?.[1]).filter(Boolean));
  document.getElementById('cont-count').textContent = conts.size;

  const contData = {};
  visited.forEach(c => {
    const cont = COUNTRIES[c]?.[1];
    if (cont) contData[cont] = (contData[cont] || 0) + 1;
  });
  document.getElementById('continents').innerHTML = Object.entries(CONTINENTS).map(([name, info]) => `
    <div class="cont-card">
      <div class="cont-emoji">${info.emoji}</div>
      <div class="cont-name">${name}</div>
      <div class="cont-count">${contData[name] || 0}<span style="font-size:0.65rem;color:#666">/${info.total}</span></div>
    </div>`).join('');

  const listEl = document.getElementById('country-list');
  if (visited.length === 0) {
    listEl.innerHTML = '<span class="empty-msg">まだ国が選ばれていません</span>';
  } else {
    listEl.innerHTML = [...visited]
      .sort((a,b) => (COUNTRIES[a]?.[0]||a).localeCompare(COUNTRIES[b]?.[0]||b))
      .map(c => `
        <div class="country-chip" onclick="showModal('${c}')">
          ${getFlag(c)} ${A3[c] || c}
        </div>`).join('');
  }
}

function showModal(code) {
  pendingCode = code;
  const alpha3 = A3[code] || code;
  const name   = COUNTRIES[code]?.[0] || code;
  const isVisited = visited.includes(code);

  document.getElementById('modalFlag').textContent = alpha3;
  document.getElementById('modalName').textContent = name;

  const btn = document.getElementById('modalActionBtn');
  if (isVisited) {
    document.getElementById('modalMsg').textContent = '訪問済みから削除しますか？';
    btn.textContent = '削除';
    btn.className = 'btn-remove';
  } else {
    document.getElementById('modalMsg').textContent = '訪問済みに追加しますか？';
    btn.textContent = '追加';
    btn.className = 'btn-add';
  }
  document.getElementById('confirmModal').classList.add('show');
}

function confirmAction() {
  if (!pendingCode) return;
  if (visited.includes(pendingCode)) {
    visited = visited.filter(c => c !== pendingCode);
  } else {
    visited.push(pendingCode);
  }
  save();
  updateStats();
  // モーダルを先に閉じてから同期（closeModal内でsyncMapが走る）
  pendingCode = null;
  document.getElementById('confirmModal').classList.remove('show');
  syncMap();
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
  pendingCode = null;
  // キャンセル時: jsvectormapが自動変更した選択状態をvisitedに戻す
  syncMap();
}

document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target === document.getElementById('confirmModal')) closeModal();
});

updateStats();
syncMap(); // 初期描画
</script>
</body>
</html>
