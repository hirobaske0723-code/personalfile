<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帰国後やることリスト</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'BIZ UDGothic', sans-serif;
  background: #080c14;
  min-height: 100vh;
  color: #f0f0f0;
  padding-bottom: 80px;
}

/* ── Header ── */
.page-header {
  background: linear-gradient(135deg, #1a2744 0%, #0f1a2e 100%);
  padding: 28px 16px 24px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 0.8rem;
  margin-bottom: 12px;
}
.back-link:hover { color: rgba(255,255,255,0.7); }
.page-header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.page-header .subtitle {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
}
.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 14px;
}
.stat {
  text-align: center;
}
.stat-num {
  font-size: 1.5rem;
  font-weight: 700;
  color: #5eead4;
}
.stat-label {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ── Token Setup ── */
#token-setup {
  max-width: 480px;
  margin: 40px auto;
  padding: 0 16px;
}
.token-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 24px;
}
.token-card h2 { font-size: 1rem; margin-bottom: 8px; }
.token-card p { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 16px; line-height: 1.6; }
.token-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: #f0f0f0;
  padding: 12px 14px;
  font-size: 0.85rem;
  margin-bottom: 12px;
  font-family: monospace;
}
.token-input:focus { outline: none; border-color: rgba(94,234,212,0.5); }
.btn-primary {
  width: 100%;
  background: rgba(20,184,166,0.2);
  border: 1px solid rgba(20,184,166,0.5);
  border-radius: 10px;
  color: #5eead4;
  padding: 12px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary:hover { background: rgba(20,184,166,0.3); }

/* ── Main Content ── */
#main-content { max-width: 560px; margin: 0 auto; padding: 20px 16px 0; }

/* ── Add form ── */
.add-form {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}
.add-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: #f0f0f0;
  padding: 12px 14px;
  font-size: 0.9rem;
  font-family: inherit;
}
.add-input:focus { outline: none; border-color: rgba(94,234,212,0.4); }
.add-input::placeholder { color: rgba(255,255,255,0.2); }
.add-btn {
  background: rgba(20,184,166,0.2);
  border: 1px solid rgba(20,184,166,0.5);
  border-radius: 12px;
  color: #5eead4;
  padding: 12px 16px;
  font-size: 1.2rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
.add-btn:hover { background: rgba(20,184,166,0.35); }

/* ── Sections ── */
.section-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: rgba(255,255,255,0.22);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin: 20px 0 8px 2px;
}

/* ── Todo items ── */
.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: background 0.15s;
}
.todo-item:hover { background: rgba(255,255,255,0.07); }
.todo-item.done {
  opacity: 0.45;
}
.todo-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(94,234,212,0.4);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: #5eead4;
  transition: all 0.15s;
}
.todo-item.done .todo-check {
  background: rgba(20,184,166,0.3);
  border-color: rgba(94,234,212,0.6);
}
.todo-text {
  flex: 1;
  font-size: 0.9rem;
  line-height: 1.4;
}
.todo-item.done .todo-text {
  text-decoration: line-through;
}
.todo-del {
  background: none;
  border: none;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px;
  flex-shrink: 0;
  transition: color 0.15s;
}
.todo-del:hover { color: rgba(239,68,68,0.7); }

/* ── Empty state ── */
.empty {
  text-align: center;
  color: rgba(255,255,255,0.2);
  font-size: 0.85rem;
  padding: 32px 0;
}

/* ── Saving indicator ── */
#saving {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: rgba(15,30,50,0.9);
  border: 1px solid rgba(20,184,166,0.4);
  border-radius: 10px;
  color: #5eead4;
  font-size: 0.78rem;
  padding: 8px 14px;
  display: none;
  align-items: center;
  gap: 6px;
  backdrop-filter: blur(8px);
}
#saving.show { display: flex; }

/* ── Error ── */
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px;
  color: #fca5a5;
  font-size: 0.8rem;
  padding: 10px 14px;
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }

/* ── Settings ── */
.settings-link {
  text-align: center;
  margin-top: 32px;
}
.settings-link button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.2);
  font-size: 0.75rem;
  cursor: pointer;
}
.settings-link button:hover { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">&#x2190; BASE</a>
  <h1>✈️ 帰国後やることリスト</h1>
  <div class="subtitle">旅先から追加・帰国後に消化</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-left">0</div>
      <div class="stat-label">Remaining</div>
    </div>
  </div>
</div>

<!-- Token Setup -->
<div id="token-setup" style="display:none;">
  <div class="token-card">
    <h2>🔑 GitHub Token を設定</h2>
    <p>リストをどのデバイスからでも同期するために、GitHub Personal Access Token（repoスコープ）が必要です。一度設定するとこのブラウザに保存されます。</p>
    <div class="error-msg" id="token-error"></div>
    <input type="password" class="token-input" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <button class="btn-primary" onclick="saveToken()">設定して開始</button>
  </div>
</div>

<!-- Main Content -->
<div id="main-content" style="display:none;">
  <div class="error-msg" id="main-error"></div>

  <div class="add-form">
    <input type="text" class="add-input" id="add-input" placeholder="やることを追加…" onkeydown="if(event.key==='Enter') addTodo()">
    <button class="add-btn" onclick="addTodo()">＋</button>
  </div>

  <div class="section-label">未完了</div>
  <div id="list-pending"></div>

  <div id="done-section" style="display:none;">
    <div class="section-label">完了済み</div>
    <div id="list-done"></div>
  </div>

  <div class="settings-link">
    <button onclick="resetToken()">⚙ Tokenを変更</button>
  </div>
</div>

<div id="saving">⏳ 保存中…</div>

<script>
const REPO = 'hirobaske0723-code/return-todo';
const FILE_PATH = 'return-todo.json';
const API_BASE = 'https://api.github.com';

let todos = [];
let fileSha = '';
let token = '';
let saveTimer = null;

// ── Init ──
window.addEventListener('DOMContentLoaded', function() {
  token = localStorage.getItem('gh_token_return_todo') || '';
  if (!token) {
    document.getElementById('token-setup').style.display = 'block';
  } else {
    loadTodos();
  }
});

// ── Token ──
async function saveToken() {
  const input = document.getElementById('token-input').value.trim();
  if (!input) return;
  token = input;
  const err = document.getElementById('token-error');
  err.classList.remove('show');
  try {
    await fetchTodos(token);
    localStorage.setItem('gh_token_return_todo', token);
    document.getElementById('token-setup').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    render();
  } catch(e) {
    err.textContent = 'Token が無効か権限がありません。repoスコープを確認してください。';
    err.classList.add('show');
  }
}

function resetToken() {
  localStorage.removeItem('gh_token_return_todo');
  location.reload();
}

// ── Load ──
async function loadTodos() {
  try {
    await fetchTodos(token);
    document.getElementById('main-content').style.display = 'block';
    render();
  } catch(e) {
    localStorage.removeItem('gh_token_return_todo');
    document.getElementById('token-setup').style.display = 'block';
  }
}

async function fetchTodos(t) {
  const res = await fetch(API_BASE + '/repos/' + REPO + '/contents/' + FILE_PATH, {
    headers: { Authorization: 'token ' + t, Accept: 'application/vnd.github.v3+json' }
  });
  if (res.status === 404) {
    // ファイル未作成（新リポジトリ）→ 空リストで開始、初回保存時に自動作成
    todos = [];
    fileSha = '';
    return;
  }
  if (!res.ok) throw new Error('fetch failed');
  const data = await res.json();
  fileSha = data.sha;
  const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
  const parsed = JSON.parse(decoded);
  todos = parsed.todos || [];
}

// ── Save ──
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveTodos, 800);
}

async function saveTodos() {
  const saving = document.getElementById('saving');
  saving.classList.add('show');
  try {
    const json = JSON.stringify({ todos: todos }, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(json)));
    const res = await fetch(API_BASE + '/repos/' + REPO + '/contents/' + FILE_PATH, {
      method: 'PUT',
      headers: {
        Authorization: 'token ' + token,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(Object.assign(
        { message: 'update return-todo list', content: encoded },
        fileSha ? { sha: fileSha } : {}
      ))
    });
    if (!res.ok) throw new Error('save failed');
    const data = await res.json();
    fileSha = data.content.sha;
  } catch(e) {
    const err = document.getElementById('main-error');
    err.textContent = '保存に失敗しました。通信状況を確認してください。';
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 4000);
  } finally {
    saving.classList.remove('show');
  }
}

// ── CRUD ──
function addTodo() {
  const input = document.getElementById('add-input');
  const text = input.value.trim();
  if (!text) return;
  todos.unshift({ id: Date.now(), text: text, done: false, createdAt: new Date().toISOString() });
  input.value = '';
  render();
  scheduleSave();
}

function toggleTodo(id) {
  const todo = todos.find(t => t.id === id);
  if (!todo) return;
  if (!todo.done && !confirm(`「${todo.text}」を完了にしますか？`)) return;
  todo.done = !todo.done;
  render();
  scheduleSave();
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  render();
  scheduleSave();
}

// ── Render ──
function render() {
  const pending = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);

  document.getElementById('stat-total').textContent = todos.length;
  document.getElementById('stat-done').textContent = done.length;
  document.getElementById('stat-left').textContent = pending.length;

  document.getElementById('list-pending').innerHTML = pending.length
    ? pending.map(t => todoHTML(t)).join('')
    : '<div class="empty">未完了のタスクはありません</div>';

  const doneSection = document.getElementById('done-section');
  if (done.length > 0) {
    doneSection.style.display = 'block';
    document.getElementById('list-done').innerHTML = done.map(t => todoHTML(t)).join('');
  } else {
    doneSection.style.display = 'none';
  }
}

function todoHTML(t) {
  return '<div class="todo-item' + (t.done ? ' done' : '') + '">' +
    '<button class="todo-check" onclick="toggleTodo(' + t.id + ')">' + (t.done ? '✓' : '') + '</button>' +
    '<span class="todo-text">' + escHtml(t.text) + '</span>' +
    '<button class="todo-del" onclick="deleteTodo(' + t.id + ')">×</button>' +
    '</div>';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

</body>
</html>
