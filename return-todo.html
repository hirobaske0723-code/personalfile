<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帰国後やることリスト</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'BIZ UDGothic', sans-serif;
  background: #080c14;
  min-height: 100vh;
  color: #f0f0f0;
  padding-bottom: 80px;
}

/* ── Header ── */
.page-header {
  background: linear-gradient(135deg, #1a2744 0%, #0f1a2e 100%);
  padding: 28px 16px 24px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 0.8rem;
  margin-bottom: 12px;
}
.back-link:hover { color: rgba(255,255,255,0.7); }
.page-header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.page-header .subtitle {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
}
.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 14px;
}
.stat { text-align: center; }
.stat-num {
  font-size: 1.5rem;
  font-weight: 700;
  color: #5eead4;
}
.stat-label {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ── Token Setup ── */
#token-setup {
  max-width: 480px;
  margin: 40px auto;
  padding: 0 16px;
}
.token-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 24px;
}
.token-card h2 { font-size: 1rem; margin-bottom: 8px; }
.token-card p { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 16px; line-height: 1.6; }
.token-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: #f0f0f0;
  padding: 12px 14px;
  font-size: 0.85rem;
  margin-bottom: 12px;
  font-family: monospace;
}
.token-input:focus { outline: none; border-color: rgba(94,234,212,0.5); }
.btn-primary {
  width: 100%;
  background: rgba(20,184,166,0.2);
  border: 1px solid rgba(20,184,166,0.5);
  border-radius: 10px;
  color: #5eead4;
  padding: 12px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary:hover { background: rgba(20,184,166,0.3); }

/* ── Main Content ── */
#main-content { max-width: 560px; margin: 0 auto; padding: 20px 16px 0; }

/* ── Add form ── */
.add-form {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.add-input {
  flex: 1;
  min-width: 160px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: #f0f0f0;
  padding: 12px 14px;
  font-size: 0.9rem;
  font-family: inherit;
}
.add-input:focus { outline: none; border-color: rgba(94,234,212,0.4); }
.add-input::placeholder { color: rgba(255,255,255,0.2); }
.cat-select {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: rgba(255,255,255,0.6);
  padding: 12px 10px;
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  flex-shrink: 0;
}
.cat-select:focus { outline: none; border-color: rgba(94,234,212,0.4); }
.cat-select option { background: #1a2744; color: #f0f0f0; }
.add-btn {
  background: rgba(20,184,166,0.2);
  border: 1px solid rgba(20,184,166,0.5);
  border-radius: 12px;
  color: #5eead4;
  padding: 12px 16px;
  font-size: 1.2rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
.add-btn:hover { background: rgba(20,184,166,0.35); }

/* ── Category sections ── */
.cat-section { margin-bottom: 20px; }
.cat-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 4px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 8px;
}
.cat-icon { font-size: 1rem; }
.cat-name {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  flex: 1;
}
.cat-count {
  font-size: 0.65rem;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 2px 8px;
  color: rgba(255,255,255,0.4);
}

/* Category colors */
.cat-header[data-cat="admin"]    .cat-name { color: #60a5fa; }
.cat-header[data-cat="job"]      .cat-name { color: #34d399; }
.cat-header[data-cat="people"]   .cat-name { color: #a78bfa; }
.cat-header[data-cat="challenge"].cat-name { color: #fbbf24; }
.cat-header[data-cat="contract"] .cat-name { color: #fb923c; }
.cat-header[data-cat="buy"]      .cat-name { color: #f87171; }
.cat-header[data-cat="other"]    .cat-name { color: rgba(255,255,255,0.4); }

/* ── Todo items ── */
.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}
.todo-item:hover { background: rgba(255,255,255,0.07); }
.todo-item.done { opacity: 0.45; }

.todo-item[data-cat="admin"]    { border-left-color: #3b82f6; }
.todo-item[data-cat="job"]      { border-left-color: #10b981; }
.todo-item[data-cat="people"]   { border-left-color: #8b5cf6; }
.todo-item[data-cat="challenge"]{ border-left-color: #f59e0b; }
.todo-item[data-cat="contract"] { border-left-color: #f97316; }
.todo-item[data-cat="buy"]      { border-left-color: #f43f5e; }
.todo-item[data-cat="other"]    { border-left-color: #6b7280; }

.todo-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(94,234,212,0.4);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: #5eead4;
  transition: all 0.15s;
}
.todo-item.done .todo-check {
  background: rgba(20,184,166,0.3);
  border-color: rgba(94,234,212,0.6);
}
.todo-text {
  flex: 1;
  font-size: 0.9rem;
  line-height: 1.4;
}
.todo-item.done .todo-text { text-decoration: line-through; }
.todo-del {
  background: none;
  border: none;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px;
  flex-shrink: 0;
  transition: color 0.15s;
}
.todo-del:hover { color: rgba(239,68,68,0.7); }

/* ── Done section ── */
.done-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.25);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 6px 4px;
  margin: 24px 0 8px;
  width: 100%;
  text-align: left;
}
.done-toggle:hover { color: rgba(255,255,255,0.45); }
.done-toggle .toggle-arrow { transition: transform 0.2s; font-size: 0.7rem; }
.done-toggle.collapsed .toggle-arrow { transform: rotate(-90deg); }

/* ── Empty state ── */
.empty {
  text-align: center;
  color: rgba(255,255,255,0.2);
  font-size: 0.85rem;
  padding: 32px 0;
}

/* ── Saving indicator ── */
#saving {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: rgba(15,30,50,0.9);
  border: 1px solid rgba(20,184,166,0.4);
  border-radius: 10px;
  color: #5eead4;
  font-size: 0.78rem;
  padding: 8px 14px;
  display: none;
  align-items: center;
  gap: 6px;
  backdrop-filter: blur(8px);
}
#saving.show { display: flex; }

/* ── Error ── */
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px;
  color: #fca5a5;
  font-size: 0.8rem;
  padding: 10px 14px;
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }

/* ── Settings ── */
.settings-link {
  text-align: center;
  margin-top: 32px;
}
.settings-link button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.2);
  font-size: 0.75rem;
  cursor: pointer;
}
.settings-link button:hover { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">&#x2190; BASE</a>
  <h1>&#x2708;&#xFE0F; 帰国後やることリスト</h1>
  <div class="subtitle">旅先から追加・帰国後に消化</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-left">0</div>
      <div class="stat-label">Remaining</div>
    </div>
  </div>
</div>

<!-- Token Setup -->
<div id="token-setup" style="display:none;">
  <div class="token-card">
    <h2>&#x1F511; GitHub Token を設定</h2>
    <p>リストをどのデバイスからでも同期するために、GitHub Personal Access Token（repoスコープ）が必要です。一度設定するとこのブラウザに保存されます。</p>
    <div class="error-msg" id="token-error"></div>
    <input type="password" class="token-input" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <button class="btn-primary" onclick="saveToken()">設定して開始</button>
  </div>
</div>

<!-- Main Content -->
<div id="main-content" style="display:none;">
  <div class="error-msg" id="main-error"></div>

  <div class="add-form">
    <input type="text" class="add-input" id="add-input" placeholder="やることを追加…"
      oninput="autoDetectCat()"
      onkeydown="if(event.key==='Enter') addTodo()">
    <select class="cat-select" id="cat-select">
      <option value="">自動</option>
      <option value="admin">&#x1F3DB;&#xFE0F; 行政</option>
      <option value="job">&#x1F4BC; 就活</option>
      <option value="people">&#x1F465; 会いたい人</option>
      <option value="challenge">&#x2728; やりたいこと</option>
      <option value="contract">&#x1F4A1; 契約検討</option>
      <option value="buy">&#x1F6CD;&#xFE0F; 買いたいもの</option>
      <option value="other">&#x1F4DD; その他</option>
    </select>
    <button class="add-btn" onclick="addTodo()">＋</button>
  </div>

  <div id="list-by-category"></div>

  <div id="done-section" style="display:none;">
    <button class="done-toggle" id="done-toggle" onclick="toggleDoneSection()">
      <span class="toggle-arrow">&#x25BC;</span>
      <span id="done-toggle-label">完了済み</span>
    </button>
    <div id="list-done"></div>
  </div>

  <div class="settings-link">
    <button onclick="resetToken()">&#x2699; Tokenを変更</button>
  </div>
</div>

<div id="saving">&#x23F3; 保存中…</div>

<script>
const REPO      = 'hirobaske0723-code/return-todo';
const FILE_PATH = 'return-todo.json';
const API_BASE  = 'https://api.github.com';

const CATEGORIES = [
  { id: 'admin',     label: '行政・手続き',      icon: '🏛️' },
  { id: 'job',       label: '就活',              icon: '💼' },
  { id: 'people',    label: '会いたい人',         icon: '👥' },
  { id: 'challenge', label: 'やりたいこと',       icon: '✨' },
  { id: 'contract',  label: '契約・サービス検討', icon: '💡' },
  { id: 'buy',       label: '買いたいもの',       icon: '🛍️' },
  { id: 'other',     label: 'その他',            icon: '📝' },
];

const DETECT_RULES = [
  { cat: 'admin',     kw: ['転送', '届', '役所', '行政', '申請', '手続き', '税', '住民', '二重請求', '役場'] },
  { cat: 'job',       kw: ['就活', 'エージェント', '面談', '面接', '転職', '就職', '登録', '求人', '採用'] },
  { cat: 'people',    kw: ['会う', '会いに', '再会', 'さんと会', 'と会う', 'FF'] },
  { cat: 'challenge', kw: ['育てる', '作る', '観に行く', 'やってみ', '行ってみ', '食べてみ', '試して'] },
  { cat: 'contract',  kw: ['プラン', '契約', '回線', 'サービス', '乗り換え', '変更検討', 'サブスク'] },
  { cat: 'buy',       kw: ['購入', '買う', '原木', '冷蔵庫', '買いたい', '購入検討'] },
];

let todos   = [];
let fileSha = '';
let token   = '';
let saveTimer    = null;
let doneExpanded = false;

// ── UTF-8 safe base64 ──
function b64decode(str) {
  const binaryStr = atob(str.replace(/\n/g, ''));
  const bytes = new Uint8Array(binaryStr.length);
  for (let i = 0; i < binaryStr.length; i++) {
    bytes[i] = binaryStr.charCodeAt(i);
  }
  return new TextDecoder('utf-8').decode(bytes);
}

function b64encode(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

// ── Category detection ──
function detectCategory(text) {
  for (const rule of DETECT_RULES) {
    if (rule.kw.some(k => text.includes(k))) return rule.cat;
  }
  return 'other';
}

function autoDetectCat() {
  const sel = document.getElementById('cat-select');
  if (sel.value !== '') return; // manual override
  // just keep as "" (auto) — detection happens on add
}

// ── Init ──
window.addEventListener('DOMContentLoaded', function() {
  token = localStorage.getItem('gh_token_return_todo') || '';
  if (!token) {
    document.getElementById('token-setup').style.display = 'block';
  } else {
    loadTodos();
  }
});

// ── Token ──
async function saveToken() {
  const input = document.getElementById('token-input').value.trim();
  if (!input) return;
  token = input;
  const err = document.getElementById('token-error');
  err.classList.remove('show');
  try {
    await fetchTodos(token);
    localStorage.setItem('gh_token_return_todo', token);
    document.getElementById('token-setup').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    render();
  } catch(e) {
    err.textContent = 'Token が無効か権限がありません。repoスコープを確認してください。';
    err.classList.add('show');
  }
}

function resetToken() {
  localStorage.removeItem('gh_token_return_todo');
  location.reload();
}

// ── Load ──
async function loadTodos() {
  try {
    await fetchTodos(token);
    document.getElementById('main-content').style.display = 'block';
    render();
  } catch(e) {
    localStorage.removeItem('gh_token_return_todo');
    document.getElementById('token-setup').style.display = 'block';
  }
}

async function fetchTodos(t) {
  const res = await fetch(API_BASE + '/repos/' + REPO + '/contents/' + FILE_PATH, {
    headers: { Authorization: 'token ' + t, Accept: 'application/vnd.github.v3+json' }
  });
  if (res.status === 404) {
    todos   = [];
    fileSha = '';
    return;
  }
  if (!res.ok) throw new Error('fetch failed');
  const data    = await res.json();
  fileSha       = data.sha;
  const decoded = b64decode(data.content);
  const parsed  = JSON.parse(decoded);
  todos = parsed.todos || [];
}

// ── Save ──
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveTodos, 800);
}

async function saveTodos() {
  const saving = document.getElementById('saving');
  saving.classList.add('show');
  try {
    const json    = JSON.stringify({ todos: todos }, null, 2);
    const encoded = b64encode(json);
    const res = await fetch(API_BASE + '/repos/' + REPO + '/contents/' + FILE_PATH, {
      method: 'PUT',
      headers: {
        Authorization:  'token ' + token,
        Accept:         'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(Object.assign(
        { message: 'update return-todo list', content: encoded },
        fileSha ? { sha: fileSha } : {}
      ))
    });
    if (!res.ok) throw new Error('save failed');
    const data = await res.json();
    fileSha = data.content.sha;
  } catch(e) {
    const err = document.getElementById('main-error');
    err.textContent = '保存に失敗しました。通信状況を確認してください。';
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 4000);
  } finally {
    saving.classList.remove('show');
  }
}

// ── CRUD ──
function addTodo() {
  const input = document.getElementById('add-input');
  const sel   = document.getElementById('cat-select');
  const text  = input.value.trim();
  if (!text) return;

  const cat = sel.value || detectCategory(text);
  todos.unshift({
    id:        Date.now(),
    text:      text,
    done:      false,
    category:  cat,
    createdAt: new Date().toISOString()
  });
  input.value = '';
  sel.value   = '';
  render();
  scheduleSave();
}

function toggleTodo(id) {
  const todo = todos.find(t => t.id === id);
  if (!todo) return;
  if (!todo.done && !confirm('「' + todo.text + '」を完了にしますか？')) return;
  todo.done = !todo.done;
  render();
  scheduleSave();
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  render();
  scheduleSave();
}

// ── Done section toggle ──
function toggleDoneSection() {
  doneExpanded = !doneExpanded;
  const btn  = document.getElementById('done-toggle');
  const list = document.getElementById('list-done');
  if (doneExpanded) {
    btn.classList.remove('collapsed');
    list.style.display = 'block';
  } else {
    btn.classList.add('collapsed');
    list.style.display = 'none';
  }
}

// ── Render ──
function render() {
  const pending = todos.filter(t => !t.done);
  const done    = todos.filter(t =>  t.done);

  document.getElementById('stat-total').textContent = todos.length;
  document.getElementById('stat-done').textContent  = done.length;
  document.getElementById('stat-left').textContent  = pending.length;

  // ── Category sections ──
  const container = document.getElementById('list-by-category');
  container.innerHTML = '';

  let hasAny = false;
  for (const cat of CATEGORIES) {
    const items = pending.filter(t => (t.category || 'other') === cat.id);
    if (items.length === 0) continue;
    hasAny = true;

    const section = document.createElement('div');
    section.className = 'cat-section';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.dataset.cat = cat.id;
    header.innerHTML =
      '<span class="cat-icon">' + cat.icon + '</span>' +
      '<span class="cat-name">' + cat.label + '</span>' +
      '<span class="cat-count">' + items.length + '</span>';
    section.appendChild(header);

    items.forEach(t => {
      section.insertAdjacentHTML('beforeend', todoHTML(t));
    });

    container.appendChild(section);
  }

  if (!hasAny) {
    container.innerHTML = '<div class="empty">未完了のタスクはありません</div>';
  }

  // ── Done section ──
  const doneSection = document.getElementById('done-section');
  if (done.length > 0) {
    doneSection.style.display = 'block';
    document.getElementById('done-toggle-label').textContent =
      '完了済み (' + done.length + '件)';
    if (doneExpanded) {
      document.getElementById('list-done').innerHTML = done.map(t => todoHTML(t)).join('');
      document.getElementById('list-done').style.display = 'block';
    } else {
      document.getElementById('list-done').style.display = 'none';
      document.getElementById('done-toggle').classList.add('collapsed');
    }
  } else {
    doneSection.style.display = 'none';
  }
}

function todoHTML(t) {
  const cat = t.category || 'other';
  return '<div class="todo-item' + (t.done ? ' done' : '') + '" data-cat="' + escHtml(cat) + '">' +
    '<button class="todo-check" onclick="toggleTodo(' + t.id + ')">' + (t.done ? '&#x2713;' : '') + '</button>' +
    '<span class="todo-text">' + escHtml(t.text) + '</span>' +
    '<button class="todo-del" onclick="deleteTodo(' + t.id + ')">&#xD7;</button>' +
    '</div>';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>

</body>
</html>
