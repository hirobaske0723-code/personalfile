<style>

  /* ── Input Card ── */

    border: 1px solid rgba(255,255,255,0.1);

  .input-label {

  }

<script>
/* ────────────────────────────────────────────────
   定数・ユーティリティ
──────────────────────────────────────────────── */
const DAYS = ['日','月','火','水','木','金','土'];
const LS_KEY = 'base_weekly_items';
const PRIORITY_LABELS = { high: '高', mid: '中', low: '低' };

function today() {
  const d = new Date(); d.setHours(0,0,0,0); return d;
}

function fmt(d) {
  return `${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）`;
}

function fmtFull(d) {
  const time = d.getHours() !== 0 || d.getMinutes() !== 0
    ? ` ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
    : '';
  return fmt(d) + time;
}

/* ────────────────────────────────────────────────
   localStorage
──────────────────────────────────────────────── */
function loadItems() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
  catch { return []; }
}

function saveItems(items) {
  localStorage.setItem(LS_KEY, JSON.stringify(items));
}

/* ────────────────────────────────────────────────
   自然言語パーサー
──────────────────────────────────────────────── */
function parseDate(text) {
  const now = new Date();
  const todayD = new Date(now); todayD.setHours(0,0,0,0);

  // 時刻の抽出（HH:MM or HH時MM分 or HH時）
  let hour = 0, min = 0, hasTime = false;
  const timeM = text.match(/(\d{1,2})[時:](\d{2})分?/) || text.match(/(\d{1,2})時/);
  if (timeM) {
    hour = parseInt(timeM[1]);
    min = timeM[2] ? parseInt(timeM[2]) : 0;
    hasTime = true;
  }
  const ampm = text.match(/(午前|AM)/) ? 'am' : text.match(/(午後|PM)/) ? 'pm' : null;
  if (ampm === 'pm' && hour < 12) hour += 12;
  if (ampm === 'am' && hour === 12) hour = 0;

  const setTime = (d) => {
    if (hasTime) { d.setHours(hour, min, 0, 0); }
    else { d.setHours(0, 0, 0, 0); }
    return d;
  };

  // 今日・明日・明後日
  if (text.match(/今日|本日/)) return setTime(new Date(todayD));
  if (text.match(/明日/))       return setTime(new Date(todayD.getTime() + 86400000));
  if (text.match(/明後日/))     return setTime(new Date(todayD.getTime() + 172800000));

  // 来週
  const nextWeekDayM = text.match(/来週(月|火|水|木|金|土|日)/);
  if (nextWeekDayM) {
    const targetDay = '月火水木金土日'.indexOf(nextWeekDayM[1]);
    const d = new Date(todayD);
    const diff = (targetDay - now.getDay() + 7) % 7 || 7;
    d.setDate(d.getDate() + diff + 7);
    return setTime(d);
  }

  // 今週の曜日
  const weekDayM = text.match(/(今週)?(月|火|水|木|金|土|日)曜?/);
  if (weekDayM) {
    const targetDay = '月火水木金土日'.indexOf(weekDayM[2]);
    const d = new Date(todayD);
    let diff = (targetDay - now.getDay() + 7) % 7;
    if (diff === 0) diff = 7; // 同じ曜日は来週
    d.setDate(d.getDate() + diff);
    return setTime(d);
  }

  // ~月~日
  const dateM = text.match(/(\d{1,2})月(\d{1,2})日?/);
  if (dateM) {
    const d = new Date(now.getFullYear(), parseInt(dateM[1])-1, parseInt(dateM[2]));
    if (d < todayD) d.setFullYear(d.getFullYear()+1);
    return setTime(d);
  }

  // 時刻だけある場合は今日
  if (hasTime) {
    const d = new Date(todayD);
    d.setHours(hour, min, 0, 0);
    if (d < now) d.setDate(d.getDate()+1); // 過去時刻なら明日
    return d;
  }

  return null;
}

/* ────────────────────────────────────────────────
   タイトルクリーニング（日時キーワードを除去）
──────────────────────────────────────────────── */
function cleanTitle(text) {
  return text
    .replace(/今日|本日|明日|明後日/g, '')
    .replace(/来週|今週/g, '')
    .replace(/(月|火|水|木|金|土|日)曜日?/g, '')
    .replace(/\d{1,2}月\d{1,2}日?/g, '')
    .replace(/\d{1,2}[時:]\d{2}分?/g, '')
    .replace(/\d{1,2}時/g, '')
    .replace(/午前|午後|AM|PM/gi, '')
    .replace(/\s+/g, ' ')
    .trim();
}

/* ────────────────────────────────────────────────
   判定エンジン
──────────────────────────────────────────────── */
function classify(text) {
  const t = text;

  // ── スケジュール判定 ──
  const schedPatterns = [
    /\d{1,2}[時:]\d{2}/, /\d{1,2}時/, /午前|午後|AM|PM/i,
    /今日|明日|明後日|今週|来週/,
    /\d{1,2}月\d{1,2}日/,
    /月曜|火曜|水曜|木曜|金曜|土曜|日曜/,
    /会議|打ち合わせ|ミーティング|MTG|アポ|訪問|出張|集合|待ち合わせ|予約|診察|歯医者|病院|スクール|レッスン|セミナー|イベント|締め切り|締切|期限/,
  ];
  const isSched = schedPatterns.some(p => p.test(t));

  // ── 優先度判定 ──
  const highP = /急ぎ|至急|緊急|最優先|絶対|今すぐ|やばい|重要|important|ASAP/i.test(t);
  const lowP  = /余裕|ゆっくり|いつか|気が向いたら|できれば|後で|later/i.test(t);
  const priority = highP ? 'high' : lowP ? 'low' : 'mid';

  const date = parseDate(t);

  return {
    type: isSched ? 'schedule' : 'todo',
    priority,
    date,
  };
}

/* ────────────────────────────────────────────────
   入力処理
──────────────────────────────────────────────── */
let pendingItem = null;

function handleInput() {
  const input = document.getElementById('quick-input');
  const text = input.value.trim();
  if (!text) return;

  const result = classify(text);
  const title = result.type === 'schedule' ? (cleanTitle(text) || text) : text;
  pendingItem = { text: title, rawText: text, ...result, id: Date.now() };

  // プレビュー表示
  const preview = document.getElementById('preview');
  const typeTag = document.getElementById('preview-type-tag');
  const prioTag = document.getElementById('preview-priority-tag');
  const pvText  = document.getElementById('preview-text');
  const pvDate  = document.getElementById('preview-date');

  typeTag.textContent = result.type === 'schedule' ? '📅 スケジュール' : '✅ TODO';
  typeTag.className = 'tag ' + (result.type === 'schedule' ? 'tag-sched' : 'tag-todo');

  const prioClasses = { high: 'tag-high', mid: 'tag-mid', low: 'tag-low' };
  prioTag.textContent = '優先度 ' + PRIORITY_LABELS[result.priority];
  prioTag.className = 'tag ' + prioClasses[result.priority];

  pvText.textContent = pendingItem.text;
  pvDate.textContent = result.date ? fmtFull(result.date) : '';

  preview.classList.add('visible');
}

async function confirmAdd() {
  if (!pendingItem) return;

  const item = { ...pendingItem, done: false, createdAt: new Date().toISOString() };

  // スケジュールならGoogleカレンダーにも追加
  if (item.type === 'schedule' && item.date) {
    await addToGcal(item);
  }

  const items = loadItems();
  items.push(item);
  saveItems(items);

  document.getElementById('quick-input').value = '';
  document.getElementById('preview').classList.remove('visible');
  pendingItem = null;

  renderLocalItems();
}

async function addToGcal(item) {
  const gasUrl = getGcalUrl();
  if (!gasUrl) return;

  try {
    const startIso = new Date(item.date).toISOString();
    const url = `${gasUrl}?action=add&title=${encodeURIComponent(item.text)}&start=${encodeURIComponent(startIso)}`;
    const res = await fetch(url, { redirect: 'follow' });
    const data = await res.json();
    if (!data.ok) console.warn('GCal追加失敗:', data.error);
  } catch(e) {
    console.warn('GCal追加エラー:', e);
  }
}

// Enterキーで送信（Shift+Enterは改行）
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('quick-input');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleInput();
    }
  });
  // 自動リサイズ
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
});

/* ────────────────────────────────────────────────
   ローカルアイテム描画
──────────────────────────────────────────────── */
function renderLocalItems() {
  const items = loadItems();
  const localTodos = items.filter(i => i.type === 'todo');
  const localScheds = items.filter(i => i.type === 'schedule');

  // TODO
  const todoEl = document.getElementById('todo-list');
  const existingLocal = todoEl.querySelectorAll('[data-local-id]');
  existingLocal.forEach(el => el.remove());

  localTodos.forEach(item => {
    const el = makeTodoEl(item);
    todoEl.appendChild(el);
  });

  updateTodoCount();

  // Schedule — 既存ローカルアイテムを削除してから再構築・日付順ソート
  const schedEl = document.getElementById('sched-list');
  schedEl.querySelectorAll('[data-local-id]').forEach(el => el.remove());

  localScheds
    .sort((a, b) => {
      const da = a.date ? new Date(a.date).getTime() : Infinity;
      const db = b.date ? new Date(b.date).getTime() : Infinity;
      return da - db;
    })
    .forEach(item => {
      // GCalイベントと日付順に挿入
      const el = makeSchedEl(item);
      const itemTime = item.date ? new Date(item.date).getTime() : Infinity;
      const apiItems = Array.from(schedEl.querySelectorAll('.event-item:not([data-local-id])'));
      let inserted = false;
      for (const apiEl of apiItems) {
        const apiDate = apiEl.dataset.startTime ? parseInt(apiEl.dataset.startTime) : Infinity;
        if (itemTime <= apiDate) {
          schedEl.insertBefore(el, apiEl);
          inserted = true;
          break;
        }
      }
      if (!inserted) schedEl.appendChild(el);
    });

  updateSchedCount();
}

function makeTodoEl(item) {
  const div = document.createElement('div');
  div.className = 'todo-item';
  div.dataset.localId = item.id;
  div.innerHTML = `
    <div class="todo-check${item.done ? ' done' : ''}" onclick="toggleLocalTodo(this, ${item.id})">${item.done ? '✓' : ''}</div>
    <div class="todo-text${item.done ? ' done' : ''}">${escHtml(item.text)}</div>
    <div class="todo-meta">
      <div class="priority-dot p-${item.priority}"></div>
      ${item.date ? `<span class="todo-due${new Date(item.date) < today() ? ' overdue' : ''}">${fmtFull(new Date(item.date))}</span>` : ''}
    </div>
    <span class="todo-del" onclick="deleteItem(${item.id})">×</span>
  `;
  return div;
}

function makeSchedEl(item) {
  const div = document.createElement('div');
  div.className = 'event-item';
  div.dataset.localId = item.id;
  div.innerHTML = `
    <div class="event-dot local"></div>
    <div class="event-date">${item.date ? fmtFull(new Date(item.date)) : '日時未定'}</div>
    <div class="event-name">${escHtml(item.text)}</div>
    <span class="event-del" onclick="deleteItem(${item.id})">×</span>
  `;
  return div;
}

function toggleLocalTodo(checkEl, id) {
  const items = loadItems();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.done = !item.done;
  saveItems(items);

  const isDone = item.done;
  checkEl.classList.toggle('done', isDone);
  checkEl.textContent = isDone ? '✓' : '';
  checkEl.nextElementSibling.classList.toggle('done', isDone);
}

function deleteItem(id) {
  const items = loadItems().filter(i => i.id !== id);
  saveItems(items);
  renderLocalItems();
}

function updateTodoCount() {
  const items = loadItems().filter(i => i.type === 'todo' && !i.done);
  const notionCount = document.querySelectorAll('#todo-list .todo-item:not([data-local-id])').length;
  const total = items.length + notionCount;
  document.getElementById('todo-count').textContent = total || '—';
}

function updateSchedCount() {
  const localCount = document.querySelectorAll('#sched-list [data-local-id]').length;
  const apiCount = document.querySelectorAll('#sched-list .event-item:not([data-local-id])').length;
  const total = localCount + apiCount;
  document.getElementById('sched-count').textContent = total || '—';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ────────────────────────────────────────────────
   API読み込み
──────────────────────────────────────────────── */
const GCAL_LS_KEY = 'base_gcal_gas_url';

function getGcalUrl() {
  return localStorage.getItem(GCAL_LS_KEY) || '';
}

function saveGcalUrl() {
  const url = document.getElementById('gcal-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    alert('GAS Web AppのURLを入力してください');
    return;
  }
  localStorage.setItem(GCAL_LS_KEY, url);
  document.getElementById('gcal-setup').style.display = 'none';
  loadCalendar();
}

function resetGcalUrl() {
  localStorage.removeItem(GCAL_LS_KEY);
  loadCalendar();
}

async function loadCalendar() {
  const el = document.getElementById('sched-list');
  const gasUrl = getGcalUrl();

  if (!gasUrl) {
    document.getElementById('gcal-setup').style.display = 'block';
    el.innerHTML = '<div class="empty-msg">GAS URLを設定するとカレンダーが表示されます</div>';
    renderLocalItems();
    return;
  }

  try {
    const res = await fetch(gasUrl, { redirect: 'follow' });
    const data = await res.json();
    const items = data.items || [];
    el.innerHTML = '';
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-msg">今週のGoogleカレンダーの予定はありません</div>';
    } else {
      items.forEach(ev => {
        const start = ev.start.dateTime || ev.start.date;
        const d = new Date(start);
        const isAllDay = !ev.start.dateTime;
        const dateStr = fmt(d) + (isAllDay ? '' : ` ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`);
        const div = document.createElement('div');
        div.className = 'event-item';
        div.dataset.startTime = d.getTime();
        div.innerHTML = `
          <div class="event-dot"></div>
          <div class="event-date">${dateStr}</div>
          <div class="event-name">${escHtml(ev.summary || '（無題）')}</div>
        `;
        el.appendChild(div);
      });
    }
  } catch {
    el.innerHTML = '<div class="empty-msg">カレンダーの取得に失敗 — <span style="cursor:pointer;color:rgba(99,179,237,0.7);" onclick="resetGcalUrl()">URL再設定</span></div>';
  }
  renderLocalItems();
}

async function loadTodo() {
  const el = document.getElementById('todo-list');
  try {
    const res = await fetch('/api/notion');
    const data = await res.json();
    const results = (data.results || []).filter(page => {
      const statusEntry = Object.entries(page.properties).find(([, p]) => p.type === 'select');
      return (statusEntry?.[1]?.select?.name || '') !== '完了';
    });
    el.innerHTML = '';
    if (results.length === 0) {
      el.innerHTML = '<div class="empty-msg">NotionのTODOはありません 🎉</div>';
    } else {
      results.forEach(page => {
        const titleProp = Object.values(page.properties).find(p => p.type === 'title');
        const title = titleProp?.title?.map(t => t.plain_text).join('') || '（無題）';
        const statusEntry = Object.entries(page.properties).find(([, p]) => p.type === 'select');
        const propName = statusEntry ? statusEntry[0] : '';
        const dueProp = Object.values(page.properties).find(p => p.type === 'date');
        const dueStr = dueProp?.date?.start || '';
        let dueLabel = '', dueClass = '';
        if (dueStr) {
          const due = new Date(dueStr);
          dueLabel = fmtFull(due);
          if (due < today()) dueClass = ' overdue';
        }
        const div = document.createElement('div');
        div.className = 'todo-item';
        div.dataset.pageId = page.id;
        div.dataset.propName = propName;
        div.innerHTML = `
          <div class="todo-check" onclick="toggleNotion(this)"></div>
          <div class="todo-text">${escHtml(title)}</div>
          <div class="todo-meta">
            ${dueLabel ? `<span class="todo-due${dueClass}">${dueLabel}</span>` : ''}
          </div>
        `;
        el.appendChild(div);
      });
    }
  } catch {
    el.innerHTML = '<div class="empty-msg">TODOの取得に失敗しました</div>';
  }
  renderLocalItems();
}

function toggleNotion(checkEl) {
  const item = checkEl.closest('.todo-item');
  const isDone = checkEl.classList.toggle('done');
  checkEl.textContent = isDone ? '✓' : '';
  item.querySelector('.todo-text').classList.toggle('done', isDone);
  const anyChecked = document.querySelectorAll('#todo-list .todo-check.done').length > 0;
  document.getElementById('sync-wrap').style.display = anyChecked ? 'flex' : 'none';
}

async function syncNotion() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = '反映中...';
  const checked = Array.from(document.querySelectorAll('#todo-list .todo-item:not([data-local-id]) .todo-check.done'));
  try {
    for (const checkEl of checked) {
      const item = checkEl.closest('.todo-item');
      const res = await fetch('/api/notion-update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pageId: item.dataset.pageId, propName: item.dataset.propName, value: '完了' }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      item.remove();
    }
    document.getElementById('sync-wrap').style.display = 'none';
    btn.textContent = 'Notionに反映'; btn.disabled = false;
    if (!document.querySelector('#todo-list .todo-item:not([data-local-id])')) {
      const emptyMsg = document.createElement('div');
      emptyMsg.className = 'empty-msg';
      emptyMsg.textContent = 'NotionのTODOはありません 🎉';
      document.getElementById('todo-list').prepend(emptyMsg);
    }
    updateTodoCount();
  } catch (e) {
    btn.textContent = '失敗 — 再試行'; btn.disabled = false;
  }
}

/* ────────────────────────────────────────────────
   初期化
──────────────────────────────────────────────── */
(function init() {
  // 週ラベル
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  document.getElementById('week-label').textContent =
    `${now.getFullYear()}年 ${mon.getMonth()+1}/${mon.getDate()}〜${sun.getMonth()+1}/${sun.getDate()}`;

  document.getElementById('updated-at').textContent =
    `updated ${new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })}`;

  loadCalendar();
  loadTodo();
})();
</script>
